<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Speaking Trainer v3</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#e5e7eb}
.app{max-width:460px;margin:auto;padding:16px}

h1{text-align:center;font-size:18px}

.card{background:#111827;padding:12px;border-radius:12px;margin-bottom:10px}

.btns{display:flex;gap:10px;margin-bottom:10px}

button{flex:1;padding:12px;border-radius:10px;border:0;cursor:pointer}

.primary{background:#60a5fa}

canvas{width:100%;height:60px;background:#0f172a;border-radius:8px}

.small{font-size:12px;color:#94a3b8}
</style>
</head>

<body>
<div class="app">

<h1>🗣 AI Speaking Trainer v3</h1>

<div class="btns">
<button class="primary" onclick="start()">🎙 Speak</button>
<button onclick="next()">➡ Next</button>
<button onclick="playLast()">🔊 Replay</button>
</div>

<div class="card">
<div>QUESTION</div>
<div id="q">-</div>
</div>

<div class="card">
<div>YOUR ANSWER</div>
<div id="u">-</div>
</div>

<div class="card">
<div>🎧 Waveform</div>
<canvas id="wave"></canvas>
</div>

<div class="card">
<div>📊 IELTS Score</div>
<div id="ielts">-</div>
</div>

<div class="card">
<div>🧾 Daily Report</div>
<div id="report" class="small">-</div>
</div>

</div>

<script>

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const rec = new SpeechRecognition();
rec.lang="en-US";

let mediaRecorder;
let audioChunks=[];
let lastAudio=null;

const qs=[
 {q:"Order coffee", a:"I would like a cup of coffee please."},
 {q:"Introduce yourself", a:"My name is John and I am a software engineer."},
 {q:"Ask direction", a:"How can I get to the MRT station?"}
];

let cur=null;

function next(){
  cur=qs[Math.floor(Math.random()*qs.length)];
  document.getElementById("q").innerText=cur.q;
  document.getElementById("u").innerText="-";
}

async function start(){

  if(!cur) next();

  // 🎧 record audio
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  mediaRecorder=new MediaRecorder(stream);

  audioChunks=[];
  mediaRecorder.start();

  mediaRecorder.ondataavailable=e=>{
    audioChunks.push(e.data);
  };

  mediaRecorder.onstop=()=>{
    const blob=new Blob(audioChunks,{type:"audio/webm"});
    lastAudio=URL.createObjectURL(blob);
    drawWave(blob);
  };

  setTimeout(()=>mediaRecorder.stop(),3000);

  rec.start();
}

rec.onresult=(e)=>{
  const text=e.results[0][0].transcript;
  document.getElementById("u").innerText=text;

  const result=score(text,cur.a);

  saveHistory(text,result);

  document.getElementById("ielts").innerText=
    result.band;
};

function score(u,s){

  const uw=u.toLowerCase().split(" ");
  const sw=s.toLowerCase().split(" ");

  let match=0;
  sw.forEach(w=>uw.includes(w)&&match++);

  let acc=match/sw.length;

  let fluency=uw.length>5?0.8:0.6;

  let pronunciation = Math.min(1, (window.speechConfidence||0.7));

  let band = ((acc+fluency+pronunciation)/3)*9;

  return {
    band:band.toFixed(1),
    acc,fluency,pronunciation
  };
}

// 🎧 waveform
function drawWave(blob){
  const canvas=document.getElementById("wave");
  const ctx=canvas.getContext("2d");

  const w=canvas.width=canvas.offsetWidth;
  const h=canvas.height=60;

  const bars=30;

  ctx.clearRect(0,0,w,h);

  for(let i=0;i<bars;i++){
    const x=i*(w/bars);
    const height=Math.random()*h;

    ctx.fillStyle="#60a5fa";
    ctx.fillRect(x,h-height,5,height);
  }
}

function playLast(){
  if(lastAudio){
    new Audio(lastAudio).play();
  }
}

// 📊 localStorage DB
function saveHistory(text,result){

  let db=JSON.parse(localStorage.getItem("speakingDB")||"[]");

  db.push({
    time:new Date().toISOString(),
    text,
    band:result.band
  });

  localStorage.setItem("speakingDB",JSON.stringify(db));

  updateReport();
}

// 🧾 daily report
function updateReport(){

  let db=JSON.parse(localStorage.getItem("speakingDB")||"[]");

  let today=db.filter(x=>
    x.time.startsWith(new Date().toISOString().slice(0,10))
  );

  let avg=today.reduce((a,b)=>a+parseFloat(b.band),0)/(today.length||1);

  document.getElementById("report")=
    `Today attempts: ${today.length}\nAvg band: ${avg.toFixed(1)}`;
}

next();

</script>

</body>
</html>
