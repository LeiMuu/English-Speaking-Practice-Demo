<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Speaking School Engine v4</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#e5e7eb}
.app{max-width:520px;margin:auto;padding:16px}

h1{text-align:center;font-size:18px}

.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  border:1px solid rgba(255,255,255,.08);
}

.label{font-size:11px;color:#94a3b8;margin-bottom:6px}

.btns{display:flex;gap:8px;margin-bottom:10px}

button{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:0;
  cursor:pointer;
  font-weight:600;
}

.primary{background:#60a5fa}
.dark{background:#1f2937;color:#e5e7eb}

.chunk{
  font-size:14px;
  color:#cbd5e1;
  line-height:1.6;
}

.score{
  font-size:28px;
  font-weight:800;
  text-align:center;
}

.small{font-size:12px;color:#94a3b8;white-space:pre-line}
</style>
</head>

<body>

<div class="app">

<h1>🎓 AI Speaking School Engine v4</h1>

<div class="btns">
<button class="primary" onclick="startSpeak()">🎙 Speak</button>
<button class="dark" onclick="next()">➡ Next</button>
<button class="dark" onclick="playModel()">🔊 Listen</button>
</div>

<!-- QUESTION -->
<div class="card">
<div class="label">QUESTION</div>
<div id="q">-</div>
</div>

<!-- MODEL -->
<div class="card">
<div class="label">MODEL ANSWER</div>
<div id="model">-</div>
</div>

<!-- CHUNK -->
<div class="card">
<div class="label">SPEAKING BREAKDOWN (Chunk Training)</div>
<div id="chunk" class="chunk">-</div>
</div>

<!-- USER -->
<div class="card">
<div class="label">YOUR ANSWER</div>
<div id="user">-</div>
</div>

<!-- SCORE -->
<div class="card">
<div class="label">IELTS SCORE</div>
<div id="score" class="score">-</div>
</div>

<div class="card">
  <div class="label">🎧 LIVE WAVEFORM</div>
  <canvas id="wave"></canvas>
</div>

<!-- FEEDBACK -->
<div class="card">
<div class="label">AI FEEDBACK</div>
<div id="fb" class="small">-</div>
</div>

</div>

<script>
let audioContext;
let analyser;
let microphone;
let dataArray;
let canvas;
let ctx;
let animationId;
let streamRef;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const rec = new SpeechRecognition();
rec.lang="en-US";

const qs=[
{
q:"Order coffee",
model:"I would like a cup of coffee please."
},
{
q:"Introduce yourself",
model:"My name is John and I am a software engineer."
},
{
q:"Ask direction",
model:"How can I get to the MRT station?"
},
{
q:"Daily routine",
model:"I usually wake up at seven in the morning."
}
];

let cur=null;

// 🎯 load question
function next(){
  cur = qs[Math.floor(Math.random()*qs.length)];

  document.getElementById("q").innerText = cur.q;
  document.getElementById("model").innerText = cur.model;
  document.getElementById("user").innerText = "-";
  document.getElementById("score").innerText = "-";
  document.getElementById("fb").innerText = "-";

  document.getElementById("chunk").innerText =
    chunk(cur.model);
}

// 🧠 chunking (teacher style)
function chunk(text){
  return text
    .replace("I would like", "I would like /")
    .replace("My name is", "My name is /")
    .replace("please", "/ please")
    .replace("How can I", "How can I /");
}

// 🔊 listen model
function playModel(){
  const u = new SpeechSynthesisUtterance(cur.model);
  u.lang="en-US";
  speechSynthesis.speak(u);
}

// 🎙 speak
async function startSpeak(){

  if(!cur) next();

  streamRef = await navigator.mediaDevices.getUserMedia({ audio: true });

  initWaveform(streamRef);

  rec.start();

  // ⛔ stop after speech (simple MVP control)
  setTimeout(()=>{
    if(streamRef){
      streamRef.getTracks().forEach(t=>t.stop());
    }

    cancelAnimationFrame(animationId);

  }, 5000);
}

// 🧠 scoring engine
rec.onresult=(e)=>{
  const text = e.results[0][0].transcript;
  document.getElementById("user").innerText=text;

  const result = evaluate(text, cur.model);

  document.getElementById("score").innerText =
    result.band + " / 9";

  document.getElementById("fb").innerText =
    feedback(text, cur.model, result);

  saveDB(text, result);
};

// 🧠 AI scoring (v4 engine)
function evaluate(user, model){

  const u=user.toLowerCase().split(" ");
  const s=model.toLowerCase().split(" ");

  let match=0;
  s.forEach(w=>u.includes(w)&&match++);

  const content = match / s.length;

  const fluency = u.length >= 6 ? 0.8 : 0.6;

  const grammar =
    (user.includes("i ") || user.includes("my ")) ? 0.8 : 0.5;

  const pronunciation = 0.7; // proxy (browser limit)

  const avg = (content + fluency + grammar + pronunciation) / 4;

  const band = (avg * 9).toFixed(1);

  return {band, content, fluency, grammar, pronunciation};
}

// 🧠 teacher feedback engine
function feedback(user, model, r){

  let f=[];

  if(r.band < 5){
    f.push("🔴 Beginner level");
    f.push("👉 You are speaking keywords instead of full sentences");
    f.push("💡 Focus: Subject + Verb + Object");
  }

  else if(r.band < 7){
    f.push("🟡 Intermediate level");
    f.push("👉 Good idea but grammar incomplete");
    f.push("💡 Add structure: would / can / usually");
  }

  else{
    f.push("🟢 Advanced level");
    f.push("👉 Natural sentence flow");
    f.push("💡 Improve intonation & politeness");
  }

  if(!user.includes("please") && model.includes("please")){
    f.push("🗣 Native tip: add 'please' in polite requests");
  }

  if(user.split(" ").length < 5){
    f.push("⚠️ Expand your sentence for fluency");
  }

  if(user.includes("want coffee")){
    f.push("💡 More natural: 'I would like a coffee'");
  }

  return f.join("\n");
}

// 📊 localStorage DB
function saveDB(text, r){

  let db = JSON.parse(localStorage.getItem("speaking_v4")||"[]");

  db.push({
    time: new Date().toISOString(),
    text,
    band: r.band
  });

  localStorage.setItem("speaking_v4", JSON.stringify(db));

  updateReport();
}

// 🧾 daily report
function updateReport(){

  let db = JSON.parse(localStorage.getItem("speaking_v4")||"[]");

  let today = db.filter(x =>
    x.time.startsWith(new Date().toISOString().slice(0,10))
  );

  let avg = today.reduce((a,b)=>a+parseFloat(b.band),0) / (today.length||1);

  console.log("Today attempts:", today.length);
  console.log("Avg band:", avg.toFixed(1));
}

async function initWaveform(stream){

  audioContext = new (window.AudioContext || window.webkitAudioContext)();

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;

  microphone = audioContext.createMediaStreamSource(stream);
  microphone.connect(analyser);

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  canvas = document.getElementById("wave");
  ctx = canvas.getContext("2d");

  drawWave();
}

function drawWave(){

  animationId = requestAnimationFrame(drawWave);

  analyser.getByteFrequencyData(dataArray);

  const w = canvas.width = canvas.offsetWidth;
  const h = canvas.height = 80;

  ctx.clearRect(0,0,w,h);

  const barWidth = (w / dataArray.length) * 1.8;

  let x = 0;

  for(let i=0;i<dataArray.length;i++){

    const v = dataArray[i] / 255;
    const barHeight = v * h;

    ctx.fillStyle = "#60a5fa";

    ctx.fillRect(x, h - barHeight, barWidth, barHeight);

    x += barWidth + 2;
  }
}

next();

</script>

</body>
</html>
